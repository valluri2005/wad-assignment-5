<!DOCTYPE html>
<html>
<head>
  <title>Product App</title>
</head>
<body>

<h2>Product List</h2>

<select id="categoryFilter">
  <option value="all">All</option>
  <option value="Electronics">Electronics</option>
  <option value="Clothing">Clothing</option>
  <option value="Footwear">Footwear</option>
</select>

<div id="products"></div>

<h3>Add Product</h3>
<input type="text" id="name" placeholder="Name">
<input type="number" id="price" placeholder="Price">
<input type="text" id="category" placeholder="Category">
<input type="number" step="0.1" id="rating" placeholder="Rating">
<button onclick="addProduct()">Add</button>

<h3 id="avgRating"></h3>

<script>
let products = [];

fetch('products.json')
  .then(res => res.json())
  .then(data => {
    products = data;
    displayProducts(products);
    calculateAverage();
  });

function displayProducts(data) {
  let output = "<table border='1'><tr><th>Name</th><th>Price</th><th>Category</th><th>Rating</th></tr>";

  data.forEach(p => {
    output += `<tr>
      <td>${p.product_name}</td>
      <td>${p.price}</td>
      <td>${p.category}</td>
      <td>${p.rating}</td>
    </tr>`;
  });

  output += "</table>";
  document.getElementById("products").innerHTML = output;
}

document.getElementById("categoryFilter").addEventListener("change", function() {
  const category = this.value;

  if (category === "all") {
    displayProducts(products);
  } else {
    const filtered = products.filter(p => p.category === category);
    displayProducts(filtered);
  }
});

function calculateAverage() {
  let total = 0;

  products.forEach(p => total += p.rating);

  const avg = total / products.length;
  document.getElementById("avgRating").innerText = "Average Rating: " + avg.toFixed(2);
}

function addProduct() {
  const newProduct = {
    product_id: products.length + 1,
    product_name: document.getElementById("name").value,
    price: parseFloat(document.getElementById("price").value),
    category: document.getElementById("category").value,
    rating: parseFloat(document.getElementById("rating").value)
  };

  products.push(newProduct);
  displayProducts(products);
  calculateAverage();
}
</script>

</body>
</html>
